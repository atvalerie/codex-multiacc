name: cowodex-debug-npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "npm package version to stamp into @local/cowodex"
        required: true
        default: "0.0.0-debug.0"

concurrency:
  group: cowodex-debug-npm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-native:
    name: Build debug native - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            os: linux
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            os: linux
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            os: macos
          - runner: macos-15
            target: aarch64-apple-darwin
            os: macos

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Linux UBSan runtime
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libubsan1

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Configure Linux MUSL rusty_v8 artifact override
        if: ${{ matrix.os == 'linux' }}
        uses: ./.github/actions/setup-rusty-v8-musl
        with:
          target: ${{ matrix.target }}

      - name: Install Zig for Linux MUSL builds
        if: ${{ matrix.os == 'linux' }}
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0
          use-cache: false

      - name: Install Linux MUSL build tools
        if: ${{ matrix.os == 'linux' }}
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Configure Linux MUSL rustc UBSan wrapper
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - name: Clear Linux MUSL sanitizer flags
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.target }}"
          target_no_jitter="${target_no_jitter//-/_}"
          echo "${target_no_jitter}=1" >> "$GITHUB_ENV"

          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

          sanitize_flags() {
            local input="$1"
            input="${input//-fsanitize=undefined/}"
            input="${input//-fno-sanitize-recover=undefined/}"
            input="${input//-fno-sanitize-trap=undefined/}"
            echo "$input"
          }

          cflags="$(sanitize_flags "${CFLAGS-}")"
          cxxflags="$(sanitize_flags "${CXXFLAGS-}")"
          echo "CFLAGS=${cflags}" >> "$GITHUB_ENV"
          echo "CXXFLAGS=${cxxflags}" >> "$GITHUB_ENV"

      - name: Install Linux packaging dependencies
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ripgrep

      - name: Install macOS packaging dependencies
        if: ${{ matrix.os == 'macos' }}
        shell: bash
        run: |
          set -euo pipefail
          brew install ripgrep

      - name: Install Windows packaging dependencies
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        run: |
          choco install ripgrep -y --no-progress

      - name: Build Codex debug binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p codex-cli --bin codex --target "${{ matrix.target }}"

      - name: Build Linux bwrap helper
        if: ${{ matrix.os == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p codex-bwrap --bin bwrap --target "${{ matrix.target }}"

      - name: Build Windows sandbox helpers
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        run: |
          cargo build -p codex-windows-sandbox --bin codex-windows-sandbox-setup --bin codex-command-runner --target "${{ matrix.target }}"

      - name: Stage vendor payload
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $target = "${{ matrix.target }}"
          $profileDir = Join-Path "target" $target
          $debugDir = Join-Path $profileDir "debug"
          $vendorRoot = Join-Path $env:GITHUB_WORKSPACE "native-vendor\$target"
          $vendorCodex = Join-Path $vendorRoot "codex"
          $vendorPath = Join-Path $vendorRoot "path"
          New-Item -ItemType Directory -Force $vendorCodex, $vendorPath | Out-Null

          if ("${{ matrix.os }}" -eq "windows") {
            Copy-Item (Join-Path $debugDir "codex.exe") (Join-Path $vendorCodex "codex.exe") -Force
            Copy-Item (Join-Path $debugDir "codex-windows-sandbox-setup.exe") (Join-Path $vendorCodex "codex-windows-sandbox-setup.exe") -Force
            Copy-Item (Join-Path $debugDir "codex-command-runner.exe") (Join-Path $vendorCodex "codex-command-runner.exe") -Force
            $rg = (Get-Command rg.exe).Source
            Copy-Item $rg (Join-Path $vendorPath "rg.exe") -Force
          } else {
            Copy-Item (Join-Path $debugDir "codex") (Join-Path $vendorCodex "codex") -Force
            $rg = (Get-Command rg).Source
            Copy-Item $rg (Join-Path $vendorPath "rg") -Force
            if ("${{ matrix.os }}" -eq "linux") {
              $resources = Join-Path $vendorRoot "codex-resources"
              New-Item -ItemType Directory -Force $resources | Out-Null
              Copy-Item (Join-Path $debugDir "bwrap") (Join-Path $resources "bwrap") -Force
            }
          }

      - uses: actions/upload-artifact@v4
        with:
          name: native-vendor-${{ matrix.target }}
          path: native-vendor/${{ matrix.target }}
          if-no-files-found: error

  package:
    name: Package cowodex npm tarball
    runs-on: ubuntu-24.04
    needs: build-native
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          pattern: native-vendor-*
          path: native-vendor

      - name: Assemble vendor tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging/vendor
          find native-vendor -mindepth 1 -maxdepth 1 -type d | while read -r artifact_dir; do
            target="$(basename "${artifact_dir#native-vendor/native-vendor-}")"
            cp -R "$artifact_dir" "staging/vendor/$target"
          done

      - name: Build package staging directory
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p staging/bin dist/npm-debug
          cp -R codex-cli/bin/. staging/bin/
          cp codex-cli/package.json staging/package.json
          cp README.md staging/README.md
          node <<'NODE'
          const fs = require("fs");
          const packageJsonPath = "staging/package.json";
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
          packageJson.name = "@local/cowodex";
          packageJson.version = process.env.VERSION;
          packageJson.files = ["bin", "vendor"];
          packageJson.bin = {
            codex: "bin/codex.js",
            cowodex: "bin/codex.js",
          };
          delete packageJson.optionalDependencies;
          fs.writeFileSync(packageJsonPath, JSON.stringify(packageJson, null, 2) + "\n");
          NODE

      - name: Pack npm tarball
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm --dir staging pack --pack-destination "$GITHUB_WORKSPACE/dist/npm-debug"

      - uses: actions/upload-artifact@v4
        with:
          name: cowodex-debug-npm
          path: dist/npm-debug/*.tgz
          if-no-files-found: error
