name: blob-size-policy

on:
  workflow_dispatch:
    inputs:
      base-sha:
        description: "Base commit to compare. Defaults to HEAD~1."
        required: false
        default: ""
      head-sha:
        description: "Head commit to compare. Defaults to the workflow commit."
        required: false
        default: ""

jobs:
  check:
    name: Blob size policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Determine PR comparison range
        id: range
        shell: bash
        env:
          INPUT_BASE_SHA: ${{ inputs.base-sha }}
          INPUT_HEAD_SHA: ${{ inputs.head-sha }}
        run: |
          set -euo pipefail
          base="${INPUT_BASE_SHA}"
          head="${INPUT_HEAD_SHA:-${GITHUB_SHA}}"

          if [[ -z "${base}" ]]; then
            if git rev-parse "${head}^" >/dev/null 2>&1; then
              base="$(git rev-parse "${head}^")"
            else
              base="$(git rev-list --max-parents=0 "${head}" | tail -n1)"
            fi
          fi

          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "head=${head}" >> "$GITHUB_OUTPUT"

      - name: Check changed blob sizes
        env:
          BASE_SHA: ${{ steps.range.outputs.base }}
          HEAD_SHA: ${{ steps.range.outputs.head }}
        run: |
          python3 scripts/check_blob_size.py \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --max-bytes 512000 \
            --allowlist .github/blob-size-allowlist.txt
